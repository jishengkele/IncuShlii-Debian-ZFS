name: Build ZFS modules

on:
  workflow_dispatch:
    inputs:
      debian_image:
        description: Debian Docker image tag
        required: true
        type: choice
        default: bookworm
        options:
          - bookworm
          - trixie
          - bullseye
      kernels:
        description: Kernel versions separated by spaces or commas, or "all" for regular/cloud flavors
        required: true
        type: string
        default: all
      architectures:
        description: Architectures separated by spaces or commas
        required: true
        type: string
        default: amd64 arm64
      publish_release:
        description: Upload packages to the Debian-ZFS GitHub Release
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag used when publish_release is enabled
        required: true
        type: string
        default: Debian-ZFS
      skip_existing_release:
        description: Skip packages whose asset names already exist in release_tag
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  plan:
    name: Plan build targets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      target_count: ${{ steps.plan.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU for arm64 containers
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Read existing Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p .github-tmp

          if release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null); then
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
              --jq '.[].name' \
              | sort -u > .github-tmp/release-assets.txt
          else
            echo "Release ${RELEASE_TAG} does not exist yet; no assets will be skipped."
            : > .github-tmp/release-assets.txt
          fi

          existing_count=$(wc -l < .github-tmp/release-assets.txt | tr -d " ")
          echo "Found ${existing_count} existing Release assets."

      - name: Generate build matrix
        id: plan
        env:
          DEBIAN_IMAGE: debian:${{ inputs.debian_image }}
          KERNELS: ${{ inputs.kernels }}
          ARCHITECTURES: ${{ inputs.architectures }}
          SKIP_EXISTING_RELEASE: ${{ inputs.skip_existing_release }}
        run: |
          set -euo pipefail

          mkdir -p .github-tmp
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Checked out commit: $(git rev-parse --short HEAD)"

          if [[ "${SKIP_EXISTING_RELEASE}" == "true" ]]; then
            cp .github-tmp/release-assets.txt .github-tmp/skip-assets.txt
          else
            : > .github-tmp/skip-assets.txt
          fi

          normalized_arches=$(printf "%s" "${ARCHITECTURES}" | tr "," " ")
          : > .github-tmp/targets.jsonl

          for arch in ${normalized_arches}; do
            case "${arch}" in
              amd64|arm64) ;;
              *)
                echo "Unsupported architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            docker pull --platform "linux/${arch}" "${DEBIAN_IMAGE}"
            docker run --rm \
              --platform "linux/${arch}" \
              -e DEBIAN_FRONTEND=noninteractive \
              -e KERNELS="${KERNELS}" \
              -e SKIP_PACKAGES_FILE=/workspace/.github-tmp/skip-assets.txt \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -w /workspace \
              "${DEBIAN_IMAGE}" \
              bash -lc '
                set -euo pipefail

                apt-get update -qq >/dev/null

                source /etc/os-release
                arch=$(dpkg --print-architecture)

                supported_kernel() {
                  local kver="$1"
                  local stem tail

                  case "$arch" in
                    amd64|arm64)
                      if [[ "$kver" == *"-cloud-${arch}" ]]; then
                        return 0
                      fi
                      [[ "$kver" == *"-${arch}" ]] || return 1
                      stem="${kver%-${arch}}"
                      if [[ "$stem" != *"-"* ]]; then
                        return 0
                      fi
                      tail="${stem##*-}"
                      [[ "$tail" =~ ^[0-9]+$ ]]
                      ;;
                    *)
                      return 1
                      ;;
                  esac
                }

                add_target() {
                  local kernel="$1"
                  local package_file="zfs-modules-${kernel}.tar.gz"
                  local runner

                  if [[ -n "${SKIP_PACKAGES_FILE}" && -f "${SKIP_PACKAGES_FILE}" ]] \
                    && grep -Fxq -- "${package_file}" "${SKIP_PACKAGES_FILE}"; then
                    echo "Skip existing Release asset: ${package_file}" >&2
                    return 0
                  fi

                  case "${arch}" in
                    amd64) runner="ubuntu-24.04" ;;
                    arm64) runner="ubuntu-24.04-arm" ;;
                    *) echo "Unsupported architecture: ${arch}" >&2; return 1 ;;
                  esac

                  printf "{\"arch\":\"%s\",\"kernel\":\"%s\",\"artifact\":\"zfs-modules-%s\",\"runner\":\"%s\"}\n" \
                    "${arch}" "${kernel}" "${kernel}" "${runner}"
                }

                if [[ "${KERNELS}" == "all" ]]; then
                  while IFS= read -r kernel; do
                    [[ -z "${kernel}" ]] && continue
                    supported_kernel "${kernel}" || continue
                    add_target "${kernel}"
                  done < <(
                    apt-cache search --names-only "^linux-headers-[0-9]" 2>/dev/null \
                      | awk "{print \$1}" \
                      | sed "s/^linux-headers-//" \
                      | grep -Ev "(^|-)common($|-)|-dbg$|-dbgsym$|-all(-|$)" \
                      | sort -V
                  )
                else
                  normalized=$(printf "%s" "${KERNELS}" | tr "," " ")
                  for kernel in ${normalized}; do
                    supported_kernel "${kernel}" || {
                      echo "Skip ${kernel}: not a target for ${arch}" >&2
                      continue
                    }
                    add_target "${kernel}"
                  done
                fi
              ' >> .github-tmp/targets.jsonl
          done

          sort -u .github-tmp/targets.jsonl -o .github-tmp/targets.jsonl

          target_count=$(wc -l < .github-tmp/targets.jsonl | tr -d " ")
          echo "Planned ${target_count} build target(s)."
          cat .github-tmp/targets.jsonl

          if [[ "${target_count}" == "0" ]]; then
            matrix='{"include":[]}'
          else
            matrix=$(jq -sc '{include:.}' .github-tmp/targets.jsonl)
          fi

          {
            echo "target_count=${target_count}"
            echo "matrix=${matrix}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.kernel }}
    needs: plan
    if: ${{ needs.plan.outputs.target_count != '0' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package in Debian container
        env:
          DEBIAN_IMAGE: debian:${{ inputs.debian_image }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_KERNEL: ${{ matrix.kernel }}
        run: |
          set -euo pipefail

          mkdir -p output
          echo "Workflow SHA: ${GITHUB_SHA}"
          echo "Checked out commit: $(git rev-parse --short HEAD)"
          echo "Runner machine: $(uname -m)"
          echo "Target architecture: ${TARGET_ARCH}"
          echo "Target kernel: ${TARGET_KERNEL}"

          docker pull --platform "linux/${TARGET_ARCH}" "${DEBIAN_IMAGE}"
          docker run --rm \
            --platform "linux/${TARGET_ARCH}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${DEBIAN_IMAGE}" \
            bash zfs-builder.sh --ci --kernel "${TARGET_KERNEL}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: output/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Release assets
    needs:
      - plan
      - build
    if: ${{ always() && inputs.publish_release && needs.plan.outputs.target_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: zfs-modules-*
          path: output
          merge-multiple: true

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          packages=(output/*.tar.gz)

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No built packages were downloaded; nothing to publish."
            exit 0
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${packages[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${packages[@]}" \
              --title "${RELEASE_TAG}" \
              --notes "ZFS prebuilt modules built by GitHub Actions run ${GITHUB_RUN_ID}."
          fi

  no-targets:
    name: Report no new packages
    needs: plan
    if: ${{ needs.plan.outputs.target_count == '0' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "No new packages were planned; all selected targets already exist in the Release."
